<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m3b Antrenman Sözlüğü</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #222;
    --accent: #c8f04b;
    --accent-dim: rgba(200,240,75,0.12);
    --accent-soft: rgba(200,240,75,0.06);
    --text: #e8e8e8;
    --muted: #666;
    --tag-bg: #1a1a1a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto 20px;
  }
  .brand {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .stats-row {
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .stats-row span { color: var(--accent); }
  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    max-width: 900px;
    margin: 0 auto 6px;
  }
  .subtitle {
    max-width: 900px;
    margin: 0 auto;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  /* SEARCH + FILTER */
  .controls {
    max-width: 900px;
    margin: 20px auto 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 32px auto;
    padding: 0 24px 80px;
  }

  /* CATEGORY HEADER */
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 48px 0 16px;
  }
  .category-header:first-of-type { margin-top: 0; }
  .cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
  }
  .cat-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .cat-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* CARDS */
  .cards {
    display: grid;
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .card:hover { border-color: #333; }
  .card.open { border-color: var(--accent); }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    gap: 16px;
  }
  .card-left { flex: 1; min-width: 0; }
  .card-en {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .card-tr {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.25s, color 0.2s;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .card.open .card-arrow {
    transform: rotate(45deg);
    color: var(--accent);
  }

  .card-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }
  .card.open .card-body { display: block; }

  .card-desc {
    font-size: 14px;
    line-height: 1.7;
    color: #b0b0b0;
    margin: 14px 0 14px;
  }
  .example-block {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
  }
  .example-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .example-text {
    font-size: 13px;
    line-height: 1.65;
    color: #c8c8c8;
    font-style: italic;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    display: none;
  }
  .no-results .nr-icon { font-size: 48px; margin-bottom: 16px; }
  .no-results p { font-size: 16px; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    letter-spacing: 0.08em;
  }

  /* COUNT display */
  #visible-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    max-width: 900px;
    margin: 12px auto 0;
  }
  #visible-count span { color: var(--accent); }
</style>
</head>

// ─── BUILD UI ─────────────────────────────────────────────
const categories = [...new Set(DATA.map(d => d.cat))];
let activeFilter = 'all';
let searchQuery = '';

// Total counts
document.getElementById('total-count').textContent = DATA.length;
document.getElementById('cat-count').textContent = categories.length;

// Filters
const filtersEl = document.getElementById('filters');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = 'Tümü';
allBtn.dataset.cat = 'all';
filtersEl.appendChild(allBtn);

categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = cat;
  btn.dataset.cat = cat;
  filtersEl.appendChild(btn);
});

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.cat;
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  activeFilter = 'all';
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  filtersEl.querySelector('[data-cat="all"]').classList.add('active');
  render();
});

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let total = 0;

  const filtered = DATA.filter(item => {
    const matchCat = activeFilter === 'all' || item.cat === activeFilter;
    const matchSearch = !searchQuery || 
      item.en.toLowerCase().includes(searchQuery) || 
      item.tr.toLowerCase().includes(searchQuery) ||
      item.desc.toLowerCase().includes(searchQuery) ||
      item.ex.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    document.getElementById('no-results').style.display = 'block';
    document.getElementById('visible-count').innerHTML = '';
    return;
  }
  document.getElementById('no-results').style.display = 'none';

  const byCategory = {};
  filtered.forEach(item => {
    if (!byCategory[item.cat]) byCategory[item.cat] = [];
    byCategory[item.cat].push(item);
  });

  Object.keys(byCategory).forEach(cat => {
    const items = byCategory[cat];
    total += items.length;

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `<span class="cat-label">${cat}</span><div class="cat-line"></div><span class="cat-count">${items.length}</span>`;
    main.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'cards';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-head">
          <div class="card-left">
            <div class="card-en">${item.en}</div>
            <div class="card-tr">${item.tr}</div>
          </div>
          <div class="card-arrow">+</div>
        </div>
        <div class="card-body">
          <div class="card-desc">${item.desc}</div>
          <div class="example-block">
            <div class="example-label">▶ Örnek</div>
            <div class="example-text">${item.ex}</div>
          </div>
        </div>
      `;
      card.querySelector('.card-head').addEventListener('click', () => {
        const isOpen = card.classList.contains('open');
        document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
        if (!isOpen) card.classList.add('open');
      });
      grid.appendChild(card);
    });
    main.appendChild(grid);
  });

  document.getElementById('visible-count').innerHTML = `<span>${total}</span> terim gösteriliyor`;
}

render();
</script>
